# StayAwakeBot — Security sentinel configuration.
#
# Controls WHAT gets scanned and HOW the security subtask behaves. The signature
# database (the WHAT-to-detect) ships inside the package; override it only if you
# need a custom DB via `signatures_path` below.

settings:
  # Directories never traversed during scanning.
  exclude_dirs: [".git", "node_modules", ".next", "dist", "build", ".malware-quarantine", "reports", "sab-patches", ".venv", "venv"]
  # Max file size (bytes) to read for content matching. Source files larger than this
  # are still scanned head+tail; only non-source assets are skipped.
  max_file_bytes: 2000000
  # Shallow-clone depth for remote targets (history matchers need a few commits).
  remote_clone_depth: 50
  # Optional: where reports are written (default: reports/security). Override per run
  # with --reports-dir; set a scratch path here to keep committed reports untouched.
  # reports_dir: reports/security
  # Optional: path to a custom signature DB (default: the one packaged with stayawake).
  # signatures_path: config/my-signatures.yml

targets:
  # Local clone paths or globs (expanded with ~ and shell-style wildcards).
  local:
    - "~/dev/**"
  # GitHub accounts/orgs to enumerate and shallow-clone for scanning.
  # Requires a read-only token in env GITHUB_TOKEN (or GH_SECURITY_TOKEN).
  github:
    users: []          # e.g. [Ndevu12]
    orgs: []           # e.g. [UB-TechDEV]
    include_forks: false
    include_archived: false

# Findings to ignore (tune false positives). Each rule MUST name a `signature`
# (optionally scoped by `path_glob`); a bare `path_glob` is ignored so it can never
# blanket-suppress a fresh payload dropped on that path.
#
# These rules allow THIS repo's own intentional test material: the deliberately-infected
# fixtures and the test files that assert on inert IoC literals. Each is signature-scoped to
# `tests/**`, so a *real* payload dropped under tests/ that matches any OTHER signature is still
# reported — and `saw scan --fix` no longer quarantines the security suite's own fixtures.
allowlist:
  # Camouflage / fake-font fixtures (tests/.../fixtures/infected/public/fonts/)
  - {signature: fake-font-fa-solid-400, path_glob: "tests/**"}
  - {signature: fake-font-text-woff, path_glob: "tests/**"}
  - {signature: camouflage-blockchain-readme, path_glob: "tests/**"}
  # VS Code auto-run + .gitignore autopush fixtures
  - {signature: vscode-allow-automatic-tasks, path_glob: "tests/**"}
  - {signature: vscode-task-folderopen-exec, path_glob: "tests/**"}
  - {signature: vscode-task-runs-font, path_glob: "tests/**"}
  - {signature: gitignore-autopush-markers, path_glob: "tests/**"}
  # Code-loader IoC literals in the infected fixture + detector test files
  - {signature: loader-seed-var, path_glob: "tests/**"}
  - {signature: loader-decoder-fn, path_glob: "tests/**"}
  - {signature: loader-fromcharcode-127, path_glob: "tests/**"}
  - {signature: loader-global-bang, path_glob: "tests/**"}
  - {signature: loader-require-hijack, path_glob: "tests/**"}
  # Heuristic shapes of the same packed fixture (postcss.config.mjs)
  - {signature: obfuscated-source-file, path_glob: "tests/**"}
  - {signature: oversized-config-line, path_glob: "tests/**"}
  # Exfil-branding signatures — this repo is a scanner, so its signature DB names the worm's own
  # IoC phrases and its threat-intel prose legitimately references them. Suppress ONLY this repo's
  # own mentions (self-scoped). The runner signature is file_globs-scoped, so it needs no rule.
  - {signature: exfil-shai-hulud-branding, path_glob: "**/signatures.yml"}  # the DB names its own IoC phrase
  - {signature: exfil-shai-hulud-branding, path_glob: "tests/**"}           # detector test literals
  - {signature: exfil-shai-hulud-branding, path_glob: "CHANGELOG.md"}       # changelog documents the exact IoC
  - {signature: exfil-shai-hulud-token, path_glob: "src/**"}                # obfuscation.py / hygiene.py / DB
  - {signature: exfil-shai-hulud-token, path_glob: "docs/**"}               # security docs
  - {signature: exfil-shai-hulud-token, path_glob: "CHANGELOG.md"}          # changelog
  - {signature: exfil-shai-hulud-token, path_glob: "tests/**"}              # detector test literals
  - {signature: exfil-shai-hulud-token, path_glob: "config/**"}             # these allowlist rules name the sig IDs
  - {signature: exfil-shai-hulud-token, path_glob: ".claude/**"}            # Claude Code permission rules quote this repo's own "Shai-Hulud" commit messages
  # npm lifecycle-hook fixtures (tests/.../fixtures/infected/package.json)
  - {signature: npm-lifecycle-dropper, path_glob: "tests/**"}
  - {signature: npm-lifecycle-remote-fetch, path_glob: "tests/**"}
  - {signature: npm-lifecycle-exec, path_glob: "tests/**"}
  # Claude Code agent-autorun fixtures (tests/.../fixtures/{infected,clean}/.claude/settings.json)
  - {signature: claude-hook-autorun, path_glob: "tests/**"}
  - {signature: claude-hook-runs-payload, path_glob: "tests/**"}

# Alerting. Channels read their secrets from env (SLACK_WEBHOOK_URL, GH_SECURITY_TOKEN).
alerts:
  slack: false
  github_issues: false
  # Minimum severity that triggers an alert.
  min_severity: "high"

# See config/urls.yml for the uptime sentinel configuration.
