settings:
  timeout_seconds: 10
  retries: 2
  user_agent: "StayAwakeBot-Sentinel/1.0 (stayawakebot-sentinel)"
  alert_on_failure: true
  alert_on_recovery: true
  consecutive_failures_before_alert: 2
  # Recovery debounce: require this many consecutive healthy checks before declaring
  # recovery (closes the issue). Defaults to consecutive_failures_before_alert.
  consecutive_healthy_before_recovery: 2
  # Optional: where reports are written (default: reports). Override per run with
  # --reports-dir; set a scratch path here to keep committed reports untouched.
  # reports_dir: reports

urls:
  - name: "Ndevu Store Application"
    url: "https://ndevu-store-be.onrender.com"
    expected_status: 200
    max_response_ms: 800
    check_ssl: true
    keyword: "ok"
    tags: [api, production]
    timeout_seconds: 5

  - name: "The Inventory Application"
    url: "https://the-inventory-hazel.vercel.app"
    expected_status: 200
    max_response_ms: 2000
    check_ssl: true
    tags: [web, production]


# See config/security.yml for the security sentinel configuration.
