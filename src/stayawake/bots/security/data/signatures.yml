# StayAwakeBot — Security signature database (data-driven IoCs).
#
# Adding a new threat = add an entry here; no Python changes required (DRY/scalable).
# Each signature is consumed by the matcher named in its `matcher` field. Matcher-
# specific keys are documented per type in helpers/security/matchers.py.
#
# Fields (common):
#   id          unique, kebab-case
#   category    grouping (code-loader | fake-font | vscode-autorun | git-marker | camouflage | evil-merge | exfil | npm-lifecycle | workflow-autorun | runner-persistence | agent-autorun | supply-chain-dep | supply-chain-vuln)
#   severity    critical | high | medium | low
#   matcher     content | filename | structural-json | git-history | heuristic | obfuscation |
#               npm-manifest | workflow-yaml | dependency-audit | installed-package-audit | symlink
#   description human-readable
#   remediation strategy id (consumed in Phase 3): recover (git restore, code-loader) |
#               quarantine-file | quarantine-dir | remove-foreign-vscode | strip-gitignore-markers | manual
#   confidence  verdict weight (OPTIONAL, default `confirmed`): confirmed | heuristic.
#               Orthogonal to severity. Only a `confirmed` match drives an INFECTED
#               verdict; a `heuristic` match (a SHAPE benign code can share — a packed
#               blob, an oversized line, a review-evading merge) surfaces as SUSPICIOUS
#               so the user is informed without a false "infected" alarm. See models.py.
version: 1

signatures:
  # ── Obfuscated loader fingerprints (content regex) ───────────────────────────
  - id: loader-fromcharcode-127
    category: code-loader
    severity: critical
    matcher: content
    # Tolerate member-access (String['fromCharCode']) and hex args (0x7f) too.
    pattern: 'String\s*[.\[]\s*[''"]?fromCharCode[''"]?\]?\s*\(\s*(?:127|0x7f)\s*\)'
    prefilter: "fromcharcode"   # cheap required-literal reject before the regex
    description: "Obfuscated loader fingerprint — fromCharCode(127) string shuffler"
    remediation: recover

  - id: loader-seed-var
    category: code-loader
    severity: critical
    matcher: content
    pattern: '(?:var|let|const)\s+_\$_[0-9a-f]{2,}\s*='
    prefilter: "_$_"   # cheap required-literal reject before the regex
    description: "Obfuscated loader seed variable (var/let/const _$_xxxx=)"
    remediation: recover

  - id: loader-decoder-fn
    category: code-loader
    severity: high
    matcher: content
    pattern: '\bsfL\s*\('
    prefilter: "sfl"   # cheap required-literal reject before the regex
    description: "Obfuscated loader decoder call — the sfL decoder function"
    remediation: recover

  - id: loader-global-bang
    category: code-loader
    severity: high
    matcher: content
    pattern: "global\\['!'\\]\\s*="
    prefilter: "global['!']"   # cheap required-literal reject before the regex
    description: "Loader bootstrap assigning global['!']"
    remediation: recover

  - id: loader-require-hijack
    category: code-loader
    severity: high
    matcher: content
    pattern: 'global\[_\$_[0-9a-f]+\[0\]\]\s*=\s*require'
    prefilter: "_$_"   # cheap required-literal reject before the regex
    description: "Loader reassigning global.require to smuggle CommonJS into ESM"
    remediation: recover

  # ── Camouflage README (heuristic content) ────────────────────────────────────
  - id: camouflage-blockchain-readme
    category: camouflage
    severity: medium
    matcher: content
    pattern: 'Blockchain Explorer|BlockchainFont|TechMono'
    file_globs: ["**/fonts/README.md", "**/fonts/*.md"]
    description: "Fake 'Blockchain Explorer' fonts README used as camouflage (GlassWorm-family)"
    remediation: quarantine-dir

  # ── Fake font payload (filename + content cross-check via heuristic) ─────────
  - id: fake-font-fa-solid-400
    category: fake-font
    severity: critical
    matcher: filename
    pattern: 'fa-solid-400.woff2'
    description: "Payload disguised as FontAwesome fa-solid-400.woff2 (not a real FA file)"
    remediation: quarantine-dir

  - id: fake-font-text-woff
    category: fake-font
    severity: critical
    matcher: heuristic
    kind: magic-byte-masquerade
    file_globs: ["*.woff", "*.woff2", "*.ttf", "*.otf"]
    description: "Font file whose bytes are actually JavaScript/text (disguised payload)"
    remediation: quarantine-file

  - id: disguised-binary-file
    category: fake-font
    severity: critical
    matcher: heuristic
    kind: magic-byte-masquerade
    # Same masquerade as fake-font, extended to image/wasm/pdf: an ext claiming a binary format whose
    # head lacks its magic bytes and reads as text/JS. SVG is excluded (real XML/text). #1146 blind #7.
    file_globs: ["*.png", "*.jpg", "*.jpeg", "*.gif", "*.webp", "*.bmp", "*.ico", "*.wasm", "*.pdf"]
    description: "Image/wasm/pdf file whose bytes are actually JavaScript/text (disguised payload)"
    remediation: quarantine-file

  # ── Oversized single line in a config file (obfuscation heuristic) ────────────
  - id: oversized-config-line
    category: code-loader
    severity: medium
    matcher: heuristic
    confidence: heuristic
    kind: long-line
    threshold: 2000
    file_globs: ["*.mjs", "*.cjs", "*.js", "*.ts", "postcss.config.*"]
    description: "Config file with an abnormally long single line (likely appended payload)"
    remediation: recover

  # ── Whitespace / invisible-character concealment (T1027/T1564) ────────────────
  # The technique, not the payload: content pushed off-screen behind a long horizontal-whitespace
  # run (the fake-font / postcss.config sample buried its payload behind ~752 spaces), or hidden
  # with zero-width / bidi-control chars (Trojan Source). Catches the tell even when the concealed
  # payload itself matches no fingerprint and the line is under the 2000-char long-line threshold.
  # Context-scoped (minified/generated suppressed) and heuristic → SUSPICIOUS (wide alignment can
  # rarely produce a long run). remediation: manual — review/recover the concealed content by hand.
  - id: whitespace-concealment
    category: camouflage
    severity: high
    matcher: heuristic
    confidence: heuristic
    kind: whitespace-concealment
    file_globs: ["*.mjs", "*.cjs", "*.js", "*.jsx", "*.ts", "*.tsx", "*.vue", "*.svelte", "*.json",
                 "*.woff2", "*.woff", "*.ttf", "*.otf"]
    description: "Content concealed behind a long whitespace run or zero-width/bidi-control characters (off-screen hiding)"
    remediation: manual

  # ── Whole-file obfuscation (line-agnostic, context-scoped) ───────────────────
  # Closes G4: a payload SPLIT/WRAPPED across many <2000-char lines, or living in
  # .jsx/.tsx/.vue/.svelte, defeats the formatting-keyed oversized-config-line rule.
  # This signature runs loader fingerprints + a context-scoped obfuscation detector
  # over the RAW file content (not splitlines) for hand-authored source/config only;
  # vendored/minified/generated paths are suppressed by the matcher's context gate.
  - id: obfuscated-source-file
    category: code-loader
    severity: medium
    matcher: obfuscation
    confidence: heuristic
    kind: obfuscated-file
    description: "Hand-authored source/config file containing packed/obfuscated payload (line-agnostic)"
    remediation: recover

  # Opt-in only (config `scan_build_outputs: true`, #1095b): a self-evident obfuscation construct
  # (charcode array / exec sink / base64 / escape run) found in a build/minified artifact. The
  # whole-file density heuristic is NOT run there — density is expected in bundles — so this stays
  # heuristic → SUSPICIOUS, never confirmed (a bundle can carry these legitimately). remediation:
  # manual — a build output is regenerated from source, not recovered; review the source instead.
  - id: obfuscated-build-artifact
    category: code-loader
    severity: medium
    matcher: obfuscation
    confidence: heuristic
    kind: obfuscated-build-artifact
    description: "Build/minified artifact carries a self-evident obfuscation construct (opt-in scan_build_outputs; review the source it was built from)"
    remediation: manual

  # ── VS Code auto-run harness (structured JSON) ───────────────────────────────
  - id: vscode-task-folderopen-exec
    category: vscode-autorun
    severity: critical
    matcher: structural-json
    kind: vscode-task-autorun
    description: "VS Code task auto-running a command on folderOpen (executes on open)"
    remediation: remove-foreign-vscode

  - id: vscode-task-runs-font
    category: vscode-autorun
    severity: critical
    matcher: structural-json
    kind: vscode-task-runs-font
    description: "VS Code task whose command executes a font file via node"
    remediation: remove-foreign-vscode

  - id: vscode-allow-automatic-tasks
    category: vscode-autorun
    severity: high
    matcher: structural-json
    kind: vscode-allow-automatic-tasks
    description: "settings.json enables task.allowAutomaticTasks (required for folderOpen abuse)"
    remediation: remove-foreign-vscode

  # ── AI/agent config auto-run — Claude Code hooks (.claude/settings.json) ──────
  # Same threat class as the VS Code autorun above (T1546), one config layer over. A `hooks`
  # entry runs a command on a Claude Code lifecycle event; SessionStart is the folderOpen
  # analogue (fires on opening the project). remediation: manual — the file can hold legit
  # config (permissions), so recovery is a reviewed edit, never an auto-strip.
  - id: claude-hook-autorun
    category: agent-autorun
    severity: high
    matcher: structural-json
    confidence: heuristic
    kind: claude-hook-autorun
    description: "Claude Code hook auto-runs a command on a lifecycle/open event (SessionStart etc.) — agent auto-execute foothold (review)"
    remediation: manual

  - id: claude-hook-runs-payload
    category: agent-autorun
    severity: critical
    matcher: structural-json
    kind: claude-hook-runs-payload
    description: "Claude Code hook command executes a disguised payload (remote-fetch→interpreter, font/binary, or a known loader fingerprint)"
    remediation: manual

  # ── .gitignore camouflage markers (content) ──────────────────────────────────
  - id: gitignore-autopush-markers
    category: git-marker
    severity: medium
    matcher: content
    pattern: 'temp_auto_push\.bat|temp_interactive_push\.bat|branch_structure\.json'
    file_globs: [".gitignore"]
    description: "Injected .gitignore markers for the worm's auto-push tooling"
    remediation: strip-gitignore-markers

  # ── Evil merge (git history) ─────────────────────────────────────────────────
  - id: evil-merge
    category: evil-merge
    severity: high
    matcher: git-history
    confidence: heuristic
    kind: evil-merge
    description: "Merge commit introducing content beyond a clean 3-way merge of its parents (review-evading)"
    remediation: manual

  # ── Shai-Hulud exfiltration / persistence branding (content) ─────────────────
  # The worm's own vanity labels — cheap, high-signal plain-text matches for the
  # exfiltration (attacker-repo/commit) and self-hosted-runner persistence stages.
  # remediation: manual — an external attacker repo / registered runner can't be
  # fixed by a file edit; the response is host isolation + rotate-LAST (see hygiene).
  - id: exfil-shai-hulud-branding
    category: exfil
    severity: critical
    matcher: content
    pattern: 'Sha1-Hulud:\s*The Second Coming|A Mini Shai-Hulud has Appeared'
    prefilter: "hulud"   # cheap required-literal reject before the regex
    description: "Shai-Hulud exfil branding — attacker repo/commit vanity label (Second Coming / Mini variant)"
    remediation: manual

  - id: exfil-sha1hulud-runner
    category: exfil
    severity: critical
    matcher: content
    pattern: '\bSHA1HULUD\b'
    prefilter: "sha1hulud"   # cheap required-literal reject before the regex
    # Scoped to runner / workflow / service surfaces so a prose mention of the name
    # (e.g. a threat writeup) is NOT flagged — only the IoC where it actually lives.
    file_globs: [".github/**", "**/.github/**", ".runner", "**/.runner", "**/actions-runner/**", "*.service"]
    description: "Shai-Hulud persistence — self-hosted runner named SHA1HULUD in runner/workflow config"
    remediation: manual

  - id: exfil-shai-hulud-token
    category: exfil
    severity: high
    matcher: content
    confidence: heuristic
    pattern: 'Sha[i1]-Hulud'
    prefilter: "-hulud"   # cheap required-literal reject before the regex
    description: "Shai-Hulud vanity token (bare mention — heuristic; benign in security write-ups)"
    remediation: manual

  # ── Self-hosted runner persistence — committed install artifacts ─────────────────
  # The worm registers the host as a self-hosted GitHub Actions runner (reported name
  # SHA1HULUD) for durable, credential-rotation-surviving persistence (T1543/T1546). A
  # *registered* runner writes `.runner` (registration config) and `.credentials`; committing
  # either into a source repo captures that install. Two-tier to stay honest about confidence:
  # a *file named* `.runner`/`.credentials` is a review signal (heuristic → SUSPICIOUS — the file
  # could be empty or unrelated), while a `.runner` whose CONTENT is an actual registration
  # (the serverUrl/gitHubUrl endpoint) is decisive (confirmed → INFECTED). Basename patterns
  # match at any depth. The SHA1HULUD name string inside such an install is caught by
  # exfil-sha1hulud-runner (content, path-scoped) above — defined once there, not duplicated.
  - id: runner-registration-config
    category: runner-persistence
    severity: high
    matcher: filename
    confidence: heuristic
    pattern: '.runner'
    description: "Committed file named .runner — likely a self-hosted runner registration config (review)"
    remediation: quarantine-file

  - id: runner-registration-content
    category: runner-persistence
    severity: critical
    matcher: content
    # A GitHub Actions runner .runner config always carries its registration endpoint. Scoped to
    # the runner artifact paths so the string can't false-positive on unrelated JSON elsewhere.
    pattern: '"(?:gitHubUrl|serverUrl)"\s*:\s*"https'
    prefilter: "url"   # cheap required-literal reject before the regex
    file_globs: ['.runner', '**/.runner', '**/actions-runner/**']
    description: "Committed self-hosted runner registration (.runner with a live registration endpoint) — durable CI persistence foothold"
    remediation: quarantine-file

  - id: runner-credentials-committed
    category: runner-persistence
    severity: high
    matcher: filename
    confidence: heuristic
    pattern: '.credentials'
    description: "Committed .credentials file — pairs with a self-hosted runner install (review; benign alone)"
    remediation: quarantine-file

  # ── npm install-time lifecycle-hook execution (package.json) ─────────────────
  # The npm-manifest matcher inspects ONLY the keys npm auto-runs on `npm install`
  # (preinstall/install/postinstall/prepare) — never user scripts like test/build — and
  # tests each signature's `pattern` against those command strings. remediation: manual:
  # the manifest as a whole may be legitimate, so recovery is a reviewed edit, not a strip.
  - id: npm-lifecycle-dropper
    category: npm-lifecycle
    severity: critical
    matcher: npm-manifest
    pattern: '\bsetup_bun\b'
    description: "npm lifecycle hook runs the setup_bun.js dropper (Shai-Hulud install-time exec)"
    remediation: manual

  - id: npm-lifecycle-remote-fetch
    category: npm-lifecycle
    severity: critical
    matcher: npm-manifest
    # `[^|]{0,2048}` is BOUNDED, not `[^|]*`: an unbounded run scans to end-of-string at every curl/wget
    # anchor when no pipe follows → O(n^2) ReDoS on a crafted command (#1156). A real `curl URL | sh`
    # one-liner is far under 2048 chars, so the bound is detection-identical.
    pattern: '\b(?:curl|wget)\b[^|]{0,2048}\|\s*(?:sh|bash|node|bun|bunx|deno)\b'
    description: "npm lifecycle hook pipes a remote fetch into an interpreter (curl|wget → sh/bun/node)"
    remediation: manual

  - id: npm-lifecycle-exec
    category: npm-lifecycle
    severity: high
    matcher: npm-manifest
    confidence: heuristic
    # Unusual-at-install-time runtimes/fetchers: Bun/Deno smuggling (EDR evasion) or a remote
    # fetch in an install hook. Deliberately NOT bare `node` (legit native-module postinstall
    # runs node) — the confirmed dropper/remote-fetch signatures above catch the real payloads.
    pattern: '\b(?:bun|bunx|deno|curl|wget)\b'
    description: "npm install-time lifecycle hook invokes Bun/Deno or a remote fetch (review)"
    remediation: manual

  # ── Malicious upstream dependency (package.json + lockfiles, T1195.001) ───────────
  # The campaign's PRIMARY spread: a backdoored package version pulled by `npm install`. The
  # dependency-audit matcher parses package.json (exact-pinned deps only — ranges defer to the
  # lockfile) and the npm/yarn/pnpm lockfiles (direct + transitive) and flags any dependency whose
  # exact name@version is on this data-driven blocklist. An exact match is decisive → confirmed
  # (INFECTED). remediation: manual — remove/replace the package; a dependency can't be auto-fixed.
  #
  # REFRESH PATH: two layers. (1) The inline `known_bad` seed below always ships in the wheel — a
  # zero-setup, zero-network baseline; append `name@version` entries from public advisories (JFrog,
  # GitHub Advisories, OSV) for the Shai-Hulud / Miasma campaign. (2) `corpus: true` opts this
  # signature into the DYNAMIC offline corpus: `saw db update` downloads the OpenSSF / GitHub
  # Advisories / OSV.dev malicious-package records into a local cache, and scans match resolved
  # dependencies against it too (#1120). The corpus is a superset of the seed, never a prerequisite.
  # (Behaviorally scanning node_modules content is deliberately deferred — off by default, see
  # docs/SECURITY_ARCHITECTURE.md → "Malicious upstream dependencies".)
  - id: malicious-dependency
    category: supply-chain-dep
    severity: critical
    matcher: dependency-audit
    description: "Declared/locked dependency matches a known-malicious upstream package@version (T1195.001)"
    remediation: manual
    corpus: true
    known_bad:
      - "html-to-gutenberg@4.2.11"
      - "fetch-page-assets@1.2.9"

  # ── Installed-tree audit — what's ACTUALLY on disk, reconciled against the lockfile (#1144) ────
  # The dependency-audit above sees only the DECLARED lockfile. These catch a package a postinstall
  # dropped into the installed tree (node_modules) WITHOUT editing the lockfile — invisible to a
  # lockfile-only audit. Run only when a project-local installed tree exists (skipped on a remote
  # clone). See matchers/installed_package_audit.py + dependencies/installed.py.
  - id: malicious-installed-package
    category: supply-chain-dep
    severity: critical
    matcher: installed-package-audit
    description: "A package INSTALLED on disk matches a known-malicious upstream package@version — caught even if the lockfile was not edited (T1195.001)"
    remediation: manual
    corpus: true          # reuses the SAME offline malware corpus as malicious-dependency (memoized)
  - id: ghost-package
    category: supply-chain-dep
    severity: high
    matcher: installed-package-audit
    confidence: heuristic  # SUSPICIOUS — npm writes every install to the lockfile, so off-lockfile is
                           # anomalous, but a benign locally-linked pkg (symlink, skipped) could differ
    description: "A package is present in the installed tree but absent from the lockfile — a postinstall may have dropped it off-lockfile"
    remediation: manual

  - id: tampered-installed-package
    category: supply-chain-dep
    severity: critical
    matcher: installed-package-audit
    confidence: heuristic  # SUSPICIOUS — a byte mismatch vs the package's OWN RECORD sha256 is a strong
                           # post-install-modification signal, but a local hotfix/monkeypatch on disk can
                           # also differ; surface for review rather than assert malware (T1195.001)
    description: "An installed file's bytes differ from its package's .dist-info/RECORD sha256 — modified after install (a payload injected into a dependency)"
    remediation: manual

  - id: installed-lifecycle-hook
    category: supply-chain-dep
    severity: critical
    matcher: installed-package-audit
    # No `confidence` → confirmed/INFECTED. The matcher applies ONLY the CONFIRMED npm-lifecycle
    # patterns (setup_bun dropper, curl|wget→interpreter) to an INSTALLED dependency's package.json —
    # node_modules is pruned from traversal, so the npm-manifest matcher never sees these. Measured 0
    # FP over realistic legit postinstalls (node-gyp/husky/binary-downloaders); the heuristic exec
    # pattern is deliberately NOT applied at install-tree scale (it FPs on legit curl/bun/deno there).
    description: "An INSTALLED dependency's npm lifecycle hook runs a known install-time payload (setup_bun dropper or remote-fetch→interpreter) — invisible to the lockfile/root-manifest audit (T1195.001)"
    remediation: manual

  - id: installed-entry-loader
    category: supply-chain-dep
    severity: critical
    matcher: installed-package-audit
    # No `confidence` → confirmed/INFECTED. The matcher runs ONLY the confirmed code-loader fingerprints
    # (the FP-safe tier, reused via build_content_sig) on an installed package's ENTRY files (main/bin).
    # node_modules is content-pruned, so a novel malicious package's runtime loader in its main entry is
    # otherwise invisible. TARGETED (entry files only, not brute-force all of node_modules): measured 0
    # FP over 800 real entry files, ~0.5s.
    description: "An INSTALLED dependency's entry file (main/bin) carries a known code-loader fingerprint — a novel malicious package whose payload runs on require, invisible to the lockfile audit (T1195.001)"
    remediation: manual

  # ── Vulnerable (but not malicious) upstream dependency — the OPT-IN advisory tier ─────────────
  # `advisory_corpus: true` opts this signature into the CVE side of the offline corpus. A match is
  # an ordinary security advisory (CVE/GHSA) on a declared dependency — NOT malware — so it is
  # emitted as an ADVISORY (`advisory_only`), routed out of the worm verdict: reported in its own
  # section, never makes a repo INFECTED. On by default (offline, non-gating); `saw scan
  # --no-advisories` or config `dependency_advisories: false` suppresses it. severity here is nominal
  # — the tier is informational, so it never gates. (Range-based advisories light up via the
  # per-ecosystem version-range comparators, #1124.)
  - id: vulnerable-dependency
    category: supply-chain-vuln
    severity: medium
    matcher: dependency-audit
    description: "Declared/locked dependency has a known security advisory (CVE/GHSA) — informational"
    remediation: manual
    advisory_corpus: true

  # ── GitHub Actions workflow persistence / camouflage (.github/workflows/*.yml) ───
  # The workflow-yaml matcher parses each workflow with yaml.safe_load and dispatches by `kind`.
  # Both are confidence: heuristic → SUSPICIOUS (a repo can legitimately own such a workflow);
  # remediation: manual — a planted/impersonated workflow is recovered from git or reviewed by a
  # human, never surgically stripped. (Self-hosted-runner registration inside a workflow is left
  # to the runner-persistence hardening in #1092 to avoid overlap.)
  - id: workflow-injection-run
    category: workflow-autorun
    severity: high
    matcher: workflow-yaml
    confidence: heuristic
    kind: dangerous-trigger-run-injection
    description: "Workflow with an injection-prone trigger (pull_request_target/issue_comment/discussion/workflow_run) interpolates untrusted github.event.* into a run step (script injection / secret theft)"
    remediation: manual

  - id: workflow-dependabot-impersonation
    category: workflow-autorun
    severity: high
    matcher: workflow-yaml
    confidence: heuristic
    kind: dependabot-impersonation
    description: "Workflow masquerading as Dependabot (name/filename) while using self-hosted runners, a remote-fetch-into-interpreter run step, or an untrusted-injection expression (T1036 camouflage)"
    remediation: manual

  # ── Symlink escaping the repo root (traversal / scan-evasion anomaly) ─────────
  - id: symlink-escapes-repo
    category: symlink-escape
    severity: high
    matcher: symlink
    confidence: heuristic   # SUSPICIOUS — an anomaly, not a payload; legit escaping links exist
    description: "A symlink resolves OUTSIDE the repository root — hides code behind an un-followed link (followlinks=False) or escapes the repo (T1564 defense evasion). Contents behind the link stay unscanned."
    remediation: manual

  # ── Symlink redirecting a WRITE into a sensitive sink (GhostApproval / SymJacking, #1161) ──
  - id: symlink-write-redirect
    category: symlink-write-redirect
    severity: critical
    matcher: symlink
    confidence: confirmed   # INFECTED — a committed symlink whose target is ~/.ssh, a shell startup
                            # file, git/cloud credentials, or an OS-persistence dir has no legitimate
                            # purpose; a tool/agent told to write the link's path writes THROUGH it
                            # into the sink (T1547/T1098 persistence, T1564.009 symlink attack).
    description: "A committed symlink points at a sensitive write-target outside the repo (SSH authorized_keys/keys, a shell/editor/REPL startup file, git/cloud/service credentials, a GPG keyring, a PATH executable dir, or an OS-persistence directory such as LaunchAgents/systemd/cron). A tool or agent asked to write the link's path writes THROUGH it into that sink — the GhostApproval / SymJacking write-redirect (#1161)."
    remediation: manual
