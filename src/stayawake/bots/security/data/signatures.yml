# StayAwakeBot — Security signature database (data-driven IoCs).
#
# Adding a new threat = add an entry here; no Python changes required (DRY/scalable).
# Each signature is consumed by the matcher named in its `matcher` field. Matcher-
# specific keys are documented per type in helpers/security/matchers.py.
#
# Fields (common):
#   id          unique, kebab-case
#   category    grouping (code-loader | fake-font | vscode-autorun | git-marker | camouflage | evil-merge | exfil | npm-lifecycle | workflow-autorun | runner-persistence)
#   severity    critical | high | medium | low
#   matcher     content | filename | structural-json | git-history | heuristic
#   description human-readable
#   remediation strategy id (consumed in Phase 3): recover (git restore, code-loader) |
#               quarantine-file | quarantine-dir | remove-foreign-vscode | strip-gitignore-markers | manual
#   confidence  verdict weight (OPTIONAL, default `confirmed`): confirmed | heuristic.
#               Orthogonal to severity. Only a `confirmed` match drives an INFECTED
#               verdict; a `heuristic` match (a SHAPE benign code can share — a packed
#               blob, an oversized line, a review-evading merge) surfaces as SUSPICIOUS
#               so the user is informed without a false "infected" alarm. See models.py.
version: 1

signatures:
  # ── Obfuscated loader fingerprints (content regex) ───────────────────────────
  - id: loader-fromcharcode-127
    category: code-loader
    severity: critical
    matcher: content
    # Tolerate member-access (String['fromCharCode']) and hex args (0x7f) too.
    pattern: 'String\s*[.\[]\s*[''"]?fromCharCode[''"]?\]?\s*\(\s*(?:127|0x7f)\s*\)'
    description: "Obfuscated loader fingerprint — fromCharCode(127) string shuffler"
    remediation: recover

  - id: loader-seed-var
    category: code-loader
    severity: critical
    matcher: content
    pattern: '(?:var|let|const)\s+_\$_[0-9a-f]{2,}\s*='
    description: "Obfuscated loader seed variable (var/let/const _$_xxxx=)"
    remediation: recover

  - id: loader-decoder-fn
    category: code-loader
    severity: high
    matcher: content
    pattern: '\bsfL\s*\('
    description: "Obfuscated loader decoder call — the sfL decoder function"
    remediation: recover

  - id: loader-global-bang
    category: code-loader
    severity: high
    matcher: content
    pattern: "global\\['!'\\]\\s*="
    description: "Loader bootstrap assigning global['!']"
    remediation: recover

  - id: loader-require-hijack
    category: code-loader
    severity: high
    matcher: content
    pattern: 'global\[_\$_[0-9a-f]+\[0\]\]\s*=\s*require'
    description: "Loader reassigning global.require to smuggle CommonJS into ESM"
    remediation: recover

  # ── Camouflage README (heuristic content) ────────────────────────────────────
  - id: camouflage-blockchain-readme
    category: camouflage
    severity: medium
    matcher: content
    pattern: 'Blockchain Explorer|BlockchainFont|TechMono'
    file_globs: ["**/fonts/README.md", "**/fonts/*.md"]
    description: "Fake 'Blockchain Explorer' fonts README used as camouflage (GlassWorm-family)"
    remediation: quarantine-dir

  # ── Fake font payload (filename + content cross-check via heuristic) ─────────
  - id: fake-font-fa-solid-400
    category: fake-font
    severity: critical
    matcher: filename
    pattern: 'fa-solid-400.woff2'
    description: "Payload disguised as FontAwesome fa-solid-400.woff2 (not a real FA file)"
    remediation: quarantine-dir

  - id: fake-font-text-woff
    category: fake-font
    severity: critical
    matcher: heuristic
    kind: text-in-fontfile
    file_globs: ["*.woff", "*.woff2", "*.ttf", "*.otf"]
    description: "Font file whose bytes are actually JavaScript/text (disguised payload)"
    remediation: quarantine-file

  # ── Oversized single line in a config file (obfuscation heuristic) ────────────
  - id: oversized-config-line
    category: code-loader
    severity: medium
    matcher: heuristic
    confidence: heuristic
    kind: long-line
    threshold: 2000
    file_globs: ["*.mjs", "*.cjs", "*.js", "*.ts", "postcss.config.*"]
    description: "Config file with an abnormally long single line (likely appended payload)"
    remediation: recover

  # ── Whole-file obfuscation (line-agnostic, context-scoped) ───────────────────
  # Closes G4: a payload SPLIT/WRAPPED across many <2000-char lines, or living in
  # .jsx/.tsx/.vue/.svelte, defeats the formatting-keyed oversized-config-line rule.
  # This signature runs loader fingerprints + a context-scoped obfuscation detector
  # over the RAW file content (not splitlines) for hand-authored source/config only;
  # vendored/minified/generated paths are suppressed by the matcher's context gate.
  - id: obfuscated-source-file
    category: code-loader
    severity: medium
    matcher: obfuscation
    confidence: heuristic
    kind: obfuscated-file
    description: "Hand-authored source/config file containing packed/obfuscated payload (line-agnostic)"
    remediation: recover

  # ── VS Code auto-run harness (structured JSON) ───────────────────────────────
  - id: vscode-task-folderopen-exec
    category: vscode-autorun
    severity: critical
    matcher: structural-json
    kind: vscode-task-autorun
    description: "VS Code task auto-running a command on folderOpen (executes on open)"
    remediation: remove-foreign-vscode

  - id: vscode-task-runs-font
    category: vscode-autorun
    severity: critical
    matcher: structural-json
    kind: vscode-task-runs-font
    description: "VS Code task whose command executes a font file via node"
    remediation: remove-foreign-vscode

  - id: vscode-allow-automatic-tasks
    category: vscode-autorun
    severity: high
    matcher: structural-json
    kind: vscode-allow-automatic-tasks
    description: "settings.json enables task.allowAutomaticTasks (required for folderOpen abuse)"
    remediation: remove-foreign-vscode

  # ── .gitignore camouflage markers (content) ──────────────────────────────────
  - id: gitignore-autopush-markers
    category: git-marker
    severity: medium
    matcher: content
    pattern: 'temp_auto_push\.bat|temp_interactive_push\.bat|branch_structure\.json'
    file_globs: [".gitignore"]
    description: "Injected .gitignore markers for the worm's auto-push tooling"
    remediation: strip-gitignore-markers

  # ── Evil merge (git history) ─────────────────────────────────────────────────
  - id: evil-merge
    category: evil-merge
    severity: high
    matcher: git-history
    confidence: heuristic
    kind: evil-merge
    description: "Merge commit introducing content beyond a clean 3-way merge of its parents (review-evading)"
    remediation: manual

  # ── Shai-Hulud exfiltration / persistence branding (content) ─────────────────
  # The worm's own vanity labels — cheap, high-signal plain-text matches for the
  # exfiltration (attacker-repo/commit) and self-hosted-runner persistence stages.
  # remediation: manual — an external attacker repo / registered runner can't be
  # fixed by a file edit; the response is host isolation + rotate-LAST (see hygiene).
  - id: exfil-shai-hulud-branding
    category: exfil
    severity: critical
    matcher: content
    pattern: 'Sha1-Hulud:\s*The Second Coming|A Mini Shai-Hulud has Appeared'
    description: "Shai-Hulud exfil branding — attacker repo/commit vanity label (Second Coming / Mini variant)"
    remediation: manual

  - id: exfil-sha1hulud-runner
    category: exfil
    severity: critical
    matcher: content
    pattern: '\bSHA1HULUD\b'
    # Scoped to runner / workflow / service surfaces so a prose mention of the name
    # (e.g. a threat writeup) is NOT flagged — only the IoC where it actually lives.
    file_globs: [".github/**", "**/.github/**", ".runner", "**/.runner", "**/actions-runner/**", "*.service"]
    description: "Shai-Hulud persistence — self-hosted runner named SHA1HULUD in runner/workflow config"
    remediation: manual

  - id: exfil-shai-hulud-token
    category: exfil
    severity: high
    matcher: content
    confidence: heuristic
    pattern: 'Sha[i1]-Hulud'
    description: "Shai-Hulud vanity token (bare mention — heuristic; benign in security write-ups)"
    remediation: manual

  # ── Self-hosted runner persistence — committed install artifacts ─────────────────
  # The worm registers the host as a self-hosted GitHub Actions runner (reported name
  # SHA1HULUD) for durable, credential-rotation-surviving persistence (T1543/T1546). A
  # *registered* runner writes `.runner` (registration config) and `.credentials`; committing
  # either into a source repo captures that install. Two-tier to stay honest about confidence:
  # a *file named* `.runner`/`.credentials` is a review signal (heuristic → SUSPICIOUS — the file
  # could be empty or unrelated), while a `.runner` whose CONTENT is an actual registration
  # (the serverUrl/gitHubUrl endpoint) is decisive (confirmed → INFECTED). Basename patterns
  # match at any depth. The SHA1HULUD name string inside such an install is caught by
  # exfil-sha1hulud-runner (content, path-scoped) above — defined once there, not duplicated.
  - id: runner-registration-config
    category: runner-persistence
    severity: high
    matcher: filename
    confidence: heuristic
    pattern: '.runner'
    description: "Committed file named .runner — likely a self-hosted runner registration config (review)"
    remediation: quarantine-file

  - id: runner-registration-content
    category: runner-persistence
    severity: critical
    matcher: content
    # A GitHub Actions runner .runner config always carries its registration endpoint. Scoped to
    # the runner artifact paths so the string can't false-positive on unrelated JSON elsewhere.
    pattern: '"(?:gitHubUrl|serverUrl)"\s*:\s*"https'
    file_globs: ['.runner', '**/.runner', '**/actions-runner/**']
    description: "Committed self-hosted runner registration (.runner with a live registration endpoint) — durable CI persistence foothold"
    remediation: quarantine-file

  - id: runner-credentials-committed
    category: runner-persistence
    severity: high
    matcher: filename
    confidence: heuristic
    pattern: '.credentials'
    description: "Committed .credentials file — pairs with a self-hosted runner install (review; benign alone)"
    remediation: quarantine-file

  # ── npm install-time lifecycle-hook execution (package.json) ─────────────────
  # The npm-manifest matcher inspects ONLY the keys npm auto-runs on `npm install`
  # (preinstall/install/postinstall/prepare) — never user scripts like test/build — and
  # tests each signature's `pattern` against those command strings. remediation: manual:
  # the manifest as a whole may be legitimate, so recovery is a reviewed edit, not a strip.
  - id: npm-lifecycle-dropper
    category: npm-lifecycle
    severity: critical
    matcher: npm-manifest
    pattern: '\bsetup_bun\b'
    description: "npm lifecycle hook runs the setup_bun.js dropper (Shai-Hulud install-time exec)"
    remediation: manual

  - id: npm-lifecycle-remote-fetch
    category: npm-lifecycle
    severity: critical
    matcher: npm-manifest
    pattern: '\b(?:curl|wget)\b[^|]*\|\s*(?:sh|bash|node|bun|bunx|deno)\b'
    description: "npm lifecycle hook pipes a remote fetch into an interpreter (curl|wget → sh/bun/node)"
    remediation: manual

  - id: npm-lifecycle-exec
    category: npm-lifecycle
    severity: high
    matcher: npm-manifest
    confidence: heuristic
    # Unusual-at-install-time runtimes/fetchers: Bun/Deno smuggling (EDR evasion) or a remote
    # fetch in an install hook. Deliberately NOT bare `node` (legit native-module postinstall
    # runs node) — the confirmed dropper/remote-fetch signatures above catch the real payloads.
    pattern: '\b(?:bun|bunx|deno|curl|wget)\b'
    description: "npm install-time lifecycle hook invokes Bun/Deno or a remote fetch (review)"
    remediation: manual

  # ── GitHub Actions workflow persistence / camouflage (.github/workflows/*.yml) ───
  # The workflow-yaml matcher parses each workflow with yaml.safe_load and dispatches by `kind`.
  # Both are confidence: heuristic → SUSPICIOUS (a repo can legitimately own such a workflow);
  # remediation: manual — a planted/impersonated workflow is recovered from git or reviewed by a
  # human, never surgically stripped. (Self-hosted-runner registration inside a workflow is left
  # to the runner-persistence hardening in #1092 to avoid overlap.)
  - id: workflow-injection-run
    category: workflow-autorun
    severity: high
    matcher: workflow-yaml
    confidence: heuristic
    kind: dangerous-trigger-run-injection
    description: "Workflow with an injection-prone trigger (pull_request_target/issue_comment/discussion/workflow_run) interpolates untrusted github.event.* into a run step (script injection / secret theft)"
    remediation: manual

  - id: workflow-dependabot-impersonation
    category: workflow-autorun
    severity: high
    matcher: workflow-yaml
    confidence: heuristic
    kind: dependabot-impersonation
    description: "Workflow masquerading as Dependabot (name/filename) while using self-hosted runners, a remote-fetch-into-interpreter run step, or an untrusted-injection expression (T1036 camouflage)"
    remediation: manual
