name: StayAwakeBot Sentinel — URL Availability Check (sentinel subtask)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to config file'
        required: false
        default: 'config/urls.yml'
  push:
    paths:
      - 'config/urls.yml'

permissions:
  contents: write
  issues: write

# Serialize commits to main across both sentinel workflows to avoid push races.
concurrency:
  group: stayawake-main-writer
  cancel-in-progress: false

jobs:
  availability-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b   # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run checker
        run: |
          set +e
          stayawake-health-check --config config/urls.yml
          echo "CHECKER_EXIT=$?" >> $GITHUB_ENV
          set -e

      - name: Generate report
        if: always()
        run: stayawake-health-report

      - name: Send alerts
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: stayawake-health-alert

      - name: Commit reports
        if: always()
        run: |
          git config user.name "StayAwakeBot Sentinel"
          git config user.email "bot@stayawake.local"
          git add reports/ README.md || true
          if git diff --staged --quiet; then echo "no changes to commit"; exit 0; fi
          git commit -m "chore(sentinel): availability report $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Resilient push: rebase onto any concurrent commit, retry on race.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push race; retry $i"; sleep $((RANDOM % 4 + 2))
          done
          echo "push failed after retries"; exit 1

      - name: Backup reports history
        if: always()
        run: |
          # Make a timestamped backup of reports/history.json before any repo changes
          TS=$(date -u +"%Y%m%d%H%M%S")
          if [ -f reports/history.json ]; then
            cp reports/history.json reports/history.json.bak.$TS
            echo "Backed up reports/history.json to reports/history.json.bak.$TS"
          else
            echo "No reports/history.json to back up"
          fi

      - name: Enforce checker exit code
        if: always()
        run: |
          # Fail the job after reports/alerts/commit ran if the checker detected failures.
          if [ "${CHECKER_EXIT:-0}" != "0" ]; then
            echo "Checker reported failures (exit ${CHECKER_EXIT})."
            exit 1
          fi
