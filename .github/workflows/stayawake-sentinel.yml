name: StayAwakeBot Sentinel — URL Availability Check (sentinel subtask)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to config file'
        required: false
        default: 'config/urls.yml'
  push:
    branches: [main]
    paths:
      - 'config/urls.yml'

permissions:
  contents: read     # the sentinel commits NOTHING — status lives in ONE self-updating issue (#1149)
  issues: write      # find-or-update the single 'Availability status' dashboard issue

# One run at a time so two overlapping cron ticks can't race the issue update (save() self-heals
# any duplicate anyway; this just avoids the churn).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  availability-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1

      - name: Set up toolchain
        uses: ./.github/actions/setup

      - name: Check availability + refresh the status issue
        # One command: check every URL, fold the result into the single dashboard issue (the whole
        # store — debounce + incidents live in its hidden state block), Slack on transitions, then
        # exit non-zero if anything is down. No report files, no commits.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: stayawake-health-check --config config/urls.yml --fail-on-unhealthy
