name: StayAwakeBot Sentinel — URL Availability Check (sentinel subtask)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to config file'
        required: false
        default: 'config/urls.yml'
  push:
    paths:
      - 'config/urls.yml'

permissions:
  contents: write
  issues: write

jobs:
  availability-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Pipfile

      - name: Install pipenv and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --deploy --system

      - name: Run checker
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          python -m scripts.checker --config config/urls.yml
          echo "CHECKER_EXIT=$?" >> $GITHUB_ENV
          set -e

      - name: Generate report
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m scripts.reporter

      - name: Send alerts
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.alerter

      - name: Commit reports
        if: always()
        run: |
          git config user.name "StayAwakeBot Sentinel"
          git config user.email "bot@stayawake.local"
          git add reports/ README.md || true
          git diff --staged --quiet || git commit -m "chore(sentinel): availability report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Backup reports history
        if: always()
        run: |
          # Make a timestamped backup of reports/history.json before any repo changes
          TS=$(date -u +"%Y%m%d%H%M%S")
          if [ -f reports/history.json ]; then
            cp reports/history.json reports/history.json.bak.$TS
            echo "Backed up reports/history.json to reports/history.json.bak.$TS"
          else
            echo "No reports/history.json to back up"
          fi

      - name: Enforce checker exit code
        if: always()
        run: |
          # Fail the job after reports/alerts/commit ran if the checker detected failures.
          if [ "${CHECKER_EXIT:-0}" != "0" ]; then
            echo "Checker reported failures (exit ${CHECKER_EXIT})."
            exit 1
          fi
