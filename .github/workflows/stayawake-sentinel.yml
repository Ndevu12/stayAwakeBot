name: StayAwakeBot Sentinel — URL Availability Check (sentinel subtask)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to config file'
        required: false
        default: 'config/urls.yml'
  push:
    branches: [main]      # only on main — never commit reports onto feature/PR branches
    paths:
      - 'config/urls.yml'

permissions:
  contents: write
  issues: write

# Serialize commits to main across both sentinel workflows to avoid push races.
concurrency:
  group: stayawake-main-writer
  cancel-in-progress: false

jobs:
  availability-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up toolchain
        uses: ./.github/actions/setup

      - name: Run checker
        run: |
          set +e
          stayawake-health-check --config config/urls.yml
          echo "CHECKER_EXIT=$?" >> $GITHUB_ENV
          set -e

      - name: Generate report
        if: always()
        run: stayawake-health-report

      - name: Send alerts
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: stayawake-health-alert

      - name: Commit reports
        if: always()
        uses: ./.github/actions/commit-reports
        with:
          paths: reports/
          message-prefix: "chore(sentinel): availability report"
          author-name: StayAwakeBot Sentinel
          author-email: bot@stayawake.local

      - name: Backup reports history
        if: always()
        run: |
          # Make a timestamped backup of reports/history.json before any repo changes
          TS=$(date -u +"%Y%m%d%H%M%S")
          if [ -f reports/history.json ]; then
            cp reports/history.json reports/history.json.bak.$TS
            echo "Backed up reports/history.json to reports/history.json.bak.$TS"
          else
            echo "No reports/history.json to back up"
          fi

      - name: Enforce checker exit code
        if: always()
        run: |
          # Fail the job after reports/alerts/commit ran if the checker detected failures.
          if [ "${CHECKER_EXIT:-0}" != "0" ]; then
            echo "Checker reported failures (exit ${CHECKER_EXIT})."
            exit 1
          fi
