name: Security Auto-Remediate — open fix PRs for infected repos

# Sweeps the configured GitHub targets and opens/updates ONE de-duplicated
# remediation PR per infected repo. Event-driven by design: run on demand, or as a
# weekly backstop. Requires a GH_SECURITY_TOKEN secret (PAT with repo + PR write).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'   # weekly backstop

permissions:
  contents: read          # this repo; cross-repo writes use the PAT

jobs:
  auto-remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b   # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Open remediation PRs
        env:
          GH_SECURITY_TOKEN: ${{ secrets.GH_SECURITY_TOKEN }}
        run: stayawake-security-remediate --remote
