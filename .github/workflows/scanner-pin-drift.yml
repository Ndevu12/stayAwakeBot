name: Scanner pin drift

# The worm-guard gate pins its scanner to a reviewed SHA (sentinel-ref) so a later
# compromise of main can't silently change what the gate runs. The cost of a pin is that
# it goes stale — and a stale pin runs an out-of-date DETECTION ENGINE while you think
# you're covered. This is the OUT-OF-BAND backstop: weekly (and on demand) it compares the
# pinned engine against main and opens an actionable issue if they diverge. The IN-BAND gate
# (scanner-pin-freshness.yml) is what fails a PR at merge time; this catches drift that never
# went through a PR (e.g. an admin direct-push).
#
# It compares ONLY the engine subtree (src/stayawake/bots/security/**), so the constant
# chore(sentinel) report commits never raise a false alarm — drift fires only when the
# scanner itself has actually moved. The logic lives in .github/scripts/check_pin_drift.sh,
# which shares its engine-subtree + pin definitions with the freshness check via _pin_lib.sh.

on:
  schedule:
    - cron: '0 7 * * 1'        # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history to diff against the pin)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect engine drift from the worm-guard pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/check_pin_drift.sh
