name: Worm Guard — block infected merges

# Gate: scan PRs (catch injected indicators) and pushes of real code to main
# (catch evil merges). README.md is NOT excluded — the content signatures match it,
# so a payload appended to it must still be caught. reports/** is excluded only
# because the bot's own reports quote detected payloads (their evidence snippets
# would self-flag); those commits never carry executable code.
on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'

permissions:
  contents: read   # pure exit-code gate: green=clean / red=infected, keyed ONLY on the scan verdict.
                   # Code-scanning delivery lives on the non-gating security-sentinel (behind
                   # vars.ENABLE_CODE_SCANNING), so nothing but the scan can ever color this gate.

jobs:
  worm-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for evil-merge detection)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan for worm indicators
        uses: ./.github/actions/worm-scan
        with:
          # Pin the scanner to a known-good SHA, never @main (SECURITY_BASELINE doctrine):
          # a later compromise of main cannot silently change what the gate runs. This points at
          # current main (merge of #1272). Since the last pin (#1268) it catches up the computed-strip
          # review-required fix path for config payloads with no git ancestor (#1209/#1271) and the
          # lengthy-report spill / clickable-path dashboard (#1203/#1272). requires-python >=3.11
          # satisfies the 3.13 runner. Bump this deliberately after reviewed engine changes — the
          # in-band pin-freshness gate (#1172) fails an engine PR that doesn't bump this, both pin
          # copies must AGREE (check_pins_synced.sh, #1210), and scanner-pin-drift opens an issue if
          # it falls behind.
          sentinel-ref: 8d6dd3c5e2bb2cb954267939ce69c749c35a7240   # merge of #1272 — catches up computed-strip review-required fix (#1209/#1271) and lengthy-report spill (#1203/#1272)
          fail-on-findings: 'true'
          # This gate never uploads SARIF — the job conclusion is the scan's exit code, nothing
          # else. Code-scanning delivery is owned solely by security-sentinel.yml.
          upload-sarif: 'false'
          # SINGLE SOURCE OF TRUTH for the allowlist: the repo's committed, signature-scoped
          # config/security.yml (guarded by CODEOWNERS). No hand-copied allowlist-globs here —
          # `tests/test_self_scan_clean.py` runs this very scan in CI, so a drift between the
          # config and the gate is impossible (green `CI — install & test` ⇒ green gate).
          config-file: config/security.yml
