name: CI — install & test

# Validation gate that runs BEFORE code is trusted: install the package and run the
# test suite on every pull request and on pushes to main. Doc/report-only commits
# (reports/**, README.md) are skipped so the per-run sentinel pushes don't trigger
# a full test run. Mark this as a required status check in branch protection so
# nothing merges to main without it passing.
on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'
      - 'README.md'

permissions:
  contents: read

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # report every minor's result, not just the first to fail
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']   # the supported range (see requires-python)
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1

      - name: Set up toolchain
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        run: python -m unittest discover -s tests -v
