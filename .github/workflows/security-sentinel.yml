name: StayAwakeBot Security Sentinel — worm scan (security subtask)

on:
  schedule:
    - cron: '0 */6 * * *'          # every 6 hours
  workflow_dispatch:
  push:
    paths:
      - 'config/security.yml'
      - 'config/security_signatures.yml'

permissions:
  contents: write                  # commit security reports + badge
  issues: write                    # open/close finding issues

# Shared with the availability sentinel so the two never push to main concurrently.
concurrency:
  group: stayawake-main-writer
  cancel-in-progress: false

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Pipfile

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --deploy --system

      - name: Run security scan
        env:
          PYTHONPATH: ${{ github.workspace }}
          # PAT with read access to scan OTHER repos/orgs (configure as a secret).
          GH_SECURITY_TOKEN: ${{ secrets.GH_SECURITY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python -m stayawakebot.cli.security_scan --config config/security.yml
          echo "SCAN_EXIT=$?" >> $GITHUB_ENV
          set -e

      - name: Update badge + status
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m stayawakebot.cli.security_report

      - name: Send security alerts
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m stayawakebot.cli.security_alert

      - name: Commit security reports + badge
        if: always()
        run: |
          git config user.name "StayAwakeBot Security Sentinel"
          git config user.email "security-bot@stayawake.local"
          git add reports/security README.md || true
          if git diff --staged --quiet; then echo "no changes to commit"; exit 0; fi
          git commit -m "chore(security): scan report $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Resilient push: rebase onto any concurrent commit, retry on race.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push race; retry $i"; sleep $((RANDOM % 4 + 2))
          done
          echo "push failed after retries"; exit 1
