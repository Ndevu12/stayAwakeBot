name: Security Sentinel — scan, report, alert (event-driven)

# Security state only changes when code changes, so this is EVENT-DRIVEN, not on a
# clock. PRs/pushes are gated by worm-guard.yml; this runs after code lands on main
# (and on demand) to refresh the badge/status, alert on anything that slipped the
# gate, and keep a committed report. Org-wide coverage is distributed: each repo runs
# its own worm-guard on its own events. For bulk local scanning + fixes, use the CLI.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'
      - 'README.md'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly backstop: catch new signatures applied to old code

permissions:
  contents: write                  # commit security reports + badge
  issues: write                    # open/close finding issues

# Shared with the availability sentinel so the two never push to main concurrently.
concurrency:
  group: stayawake-main-writer
  cancel-in-progress: false

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for evil-merge detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Scan this repository
        run: |
          set +e
          {
            echo "settings:"
            echo "  exclude_dirs: [\".git\", \"node_modules\", \".next\", \"dist\", \"build\", \".malware-quarantine\", \".venv\"]"
            echo "targets:"
            echo "  local: [\"${{ github.workspace }}\"]"
            echo "  github: { users: [], orgs: [] }"
            echo "allowlist:"
            echo "  - path_glob: \"tests/bots/security/fixtures/**\""
          } > "$RUNNER_TEMP/ci-security.yml"
          stayawake-security-scan --config "$RUNNER_TEMP/ci-security.yml" --local-only
          echo "SCAN_EXIT=$?" >> $GITHUB_ENV
          set -e

      - name: Update badge + status
        if: always()
        run: stayawake-security-report

      - name: Send security alerts
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: stayawake-security-alert

      - name: Commit security reports + badge
        if: always()
        run: |
          git config user.name "StayAwakeBot Security Sentinel"
          git config user.email "security-bot@stayawake.local"
          git add reports/security README.md || true
          if git diff --staged --quiet; then echo "no changes to commit"; exit 0; fi
          git commit -m "chore(security): scan report $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push race; retry $i"; sleep $((RANDOM % 4 + 2))
          done
          echo "push failed after retries"; exit 1
