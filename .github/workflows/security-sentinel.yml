name: Security Sentinel — scan, report, alert (event-driven)

# Security state only changes when code changes, so this is EVENT-DRIVEN, not on a
# clock. PRs/pushes are gated by worm-guard.yml; this runs after code lands on main
# (and on demand) to refresh status, alert on anything that slipped the
# gate, and keep a committed report. Org-wide coverage is distributed: each repo runs
# its own worm-guard on its own events. For bulk local scanning + fixes, use the CLI.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'
      - 'README.md'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly backstop: catch new signatures applied to old code

permissions:
  contents: read                   # checkout only — nothing is committed back
  issues: write                    # --alert opens/closes finding issues
  security-events: write           # upload SARIF to the code-scanning / Security tab

# Shared with the availability sentinel so the two never push to main concurrently.
concurrency:
  group: stayawake-main-writer
  cancel-in-progress: false

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for evil-merge detection)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up toolchain
        uses: ./.github/actions/setup

      - name: Scan, alert, and emit SARIF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Use the committed config/security.yml as the single source of truth for the
          # allowlist: its rules are signature-scoped to tests/** (a bare path_glob is
          # intentionally ignored by the scanner, so the old inline path-only rule
          # suppressed nothing and this repo's own intentional test IoCs failed the run).
          # Scan the checked-out workspace explicitly — a positional path overrides the
          # config's local globs (~/dev/**), so it targets this repo, not the runner home.
          # Terminal-first: one pass scans, pushes GitHub-issue + Slack alerts (--alert),
          # and writes the SARIF. Exit code is the verdict (non-zero on infected), which
          # surfaces an infected main as a failed run.
          saw scan "${{ github.workspace }}" -c "${{ github.workspace }}/config/security.yml" \
            --alert --sarif "$RUNNER_TEMP/latest.sarif"

      - name: Upload SARIF to code-scanning
        # always(): the scan above exits non-zero when infected — we still want the
        # findings in the Security tab. The SARIF is written before that verdict.
        if: ${{ always() && hashFiles(format('{0}/latest.sarif', runner.temp)) != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/latest.sarif
          category: saw-security-sentinel

      - name: Upload SARIF as build artifact
        if: ${{ always() && hashFiles(format('{0}/latest.sarif', runner.temp)) != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: security-sarif
          path: ${{ runner.temp }}/latest.sarif
          if-no-files-found: warn
