name: Release — build, self-scan, publish (PyPI + GitHub Release)

# Supply-chain-hardened release pipeline. Given this project exists because of a
# self-propagating worm, the *release mechanism itself* must not become the next vector:
#   - tag-triggered only (a tag is an intentional, reviewable act)
#   - NO long-lived publish secret: PyPI upload uses Trusted Publishing (OIDC) + PEP 740
#     attestations, so there is no PYPI_API_TOKEN to steal
#   - the build job has no privileged permissions; publishing is isolated in its own job
#     with `id-token: write` and a protected GitHub Environment
#   - every third-party action is pinned to a full commit SHA (project doctrine)
#   - the release commit is re-scanned for worm indicators before anything is published
#
# Manual `workflow_dispatch` performs a TestPyPI dry-run (separate Trusted Publisher).
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

# Don't let two releases of the same ref race.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build & verify artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags for hatch-vcs versioning)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.14'
          check-latest: true

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build "twine>=6.1"
          python -m build

      - name: Validate metadata (modern twine — rejects malformed 2.4 metadata)
        run: python -m twine check --strict dist/*

      - name: Smoke-test the built wheel (entry points + packaged signature DB)
        run: |
          pip install dist/*.whl
          stayawake-security-scan --help
          stayawake-health-check --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  self-scan:
    name: Self-scan release commit for worm indicators
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for evil-merge detection)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0
      - name: Worm scan
        uses: ./.github/actions/worm-scan
        with:
          # Pin the scanner to a known-good SHA, NEVER the commit under test: a compromised
          # release commit must not be able to certify itself. Bump after an intentional
          # scanner/signature update (kept in sync with worm-guard.yml).
          sentinel-ref: 788222f4f0ce2cd2a70e0189e9cfc1be24ab0ef7   # main @ 2026-06-23
          fail-on-findings: 'true'
          allowlist-globs: >-
            tests/**|loader-fromcharcode-127,
            tests/**|loader-seed-var,
            tests/**|loader-decoder-fn,
            tests/**|loader-global-bang,
            tests/**|loader-require-hijack,
            tests/**|oversized-config-line,
            tests/**|fake-font-fa-solid-400,
            tests/**|fake-font-text-woff,
            tests/**|camouflage-blockchain-readme,
            tests/**|vscode-task-folderopen-exec,
            tests/**|vscode-task-runs-font,
            tests/**|vscode-allow-automatic-tasks,
            tests/**|gitignore-autopush-markers

  publish-testpypi:
    name: Publish to TestPyPI (manual dry-run)
    if: github.event_name == 'workflow_dispatch'
    needs: [build, self-scan]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write          # OIDC for Trusted Publishing — no API token
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b   # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, self-scan]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC for Trusted Publishing — no API token
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b   # v1.14.0
        with:
          attestations: true   # PEP 740 signed provenance, displayed on the PyPI page

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the release + upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release with auto-generated notes + artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
