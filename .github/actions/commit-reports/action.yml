name: 'Commit & push reports'
description: 'Stage report paths, commit with a timestamped message, and push to the current branch — rebasing and retrying on concurrent-writer races.'
author: 'StayAwakeBot'

inputs:
  paths:
    description: 'Space-separated paths to stage (e.g. "reports/ README.md").'
    required: true
  message-prefix:
    description: 'Commit message prefix; a "YYYY-MM-DD HH:MM UTC" stamp is appended.'
    required: true
  author-name:
    description: 'git author/committer name.'
    required: true
  author-email:
    description: 'git author/committer email.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Commit and push
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        MSG_PREFIX: ${{ inputs.message-prefix }}
        AUTHOR_NAME: ${{ inputs.author-name }}
        AUTHOR_EMAIL: ${{ inputs.author-email }}
      run: |
        git config user.name "$AUTHOR_NAME"
        git config user.email "$AUTHOR_EMAIL"
        # Word-splitting on $PATHS is intentional: callers pass multiple paths.
        git add $PATHS || true
        if git diff --staged --quiet; then echo "no changes to commit"; exit 0; fi
        git commit -m "$MSG_PREFIX $(date -u '+%Y-%m-%d %H:%M UTC')"
        # Resilient push: rebase onto any concurrent commit, retry on race.
        for i in 1 2 3 4 5; do
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
          echo "push race; retry $i"; sleep $((RANDOM % 4 + 2))
        done
        echo "push failed after retries"; exit 1
