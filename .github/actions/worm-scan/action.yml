name: 'Worm Scan'
description: 'Scan the checked-out repository for self-propagating worm indicators (obfuscated loaders, fake fonts, VS Code auto-run, evil merges) and fail on findings.'
author: 'StayAwakeBot'

inputs:
  sentinel-ref:
    description: 'Ref/SHA of Ndevu12/stayAwakeBot to run the scanner from (pin to a SHA in production).'
    required: false
    default: 'main'
  fail-on-findings:
    description: 'Fail the job when indicators are found.'
    required: false
    default: 'true'
  allowlist-globs:
    description: 'Comma-separated path globs to ignore (e.g. test fixtures that contain inert markers).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run worm scan
      shell: bash
      run: |
        set -euo pipefail
        work="$GITHUB_WORKSPACE"
        tmp="$(mktemp -d)"
        git clone --quiet --depth 1 --branch "${{ inputs.sentinel-ref }}" \
          https://github.com/Ndevu12/stayAwakeBot "$tmp/sab" \
          || git clone --quiet https://github.com/Ndevu12/stayAwakeBot "$tmp/sab"
        python -m pip install --quiet pyyaml
        {
          echo "settings:"
          echo "  signatures_path: \"$tmp/sab/config/security_signatures.yml\""
          echo "  exclude_dirs: [\".git\", \"node_modules\", \".next\", \"dist\", \"build\", \".malware-quarantine\", \".venv\"]"
          echo "targets:"
          echo "  local: [\"$work\"]"
          echo "  github: { users: [], orgs: [] }"
          if [ -n "${{ inputs.allowlist-globs }}" ]; then
            echo "allowlist:"
            IFS=',' read -ra G <<< "${{ inputs.allowlist-globs }}"
            for g in "${G[@]}"; do echo "  - path_glob: \"$(echo "$g" | xargs)\""; done
          fi
        } > "$tmp/scan.yml"
        flag=""
        [ "${{ inputs.fail-on-findings }}" = "true" ] && flag="--fail-on-findings"
        PYTHONPATH="$tmp/sab" python -m stayawakebot.cli.security_scan \
          --config "$tmp/scan.yml" --local-only $flag
