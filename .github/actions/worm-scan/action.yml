name: 'Worm Scan'
description: 'Scan the checked-out repository for self-propagating worm indicators (obfuscated loaders, fake fonts, VS Code auto-run, evil merges) and fail on findings.'
author: 'StayAwakeBot'

inputs:
  sentinel-ref:
    description: 'Ref/SHA of Ndevu12/stayAwakeBot to install the scanner from (pin to a SHA in production).'
    required: false
    default: 'main'
  fail-on-findings:
    description: 'Fail the job when indicators are found.'
    required: false
    default: 'true'
  allowlist-globs:
    description: >-
      Comma-separated allowlist entries of the form `path_glob|signature_id` (e.g.
      `tests/fixtures/**|fake-font-fa-solid-400`). A signature id is REQUIRED — a bare
      path glob is ignored, so a fresh payload under that path is still flagged.
    required: false
    default: ''
  upload-sarif:
    description: >-
      Upload the SARIF report to GitHub code-scanning so findings appear in the Security
      tab and as inline PR annotations. Requires `security-events: write` on the calling
      job. Set to 'false' to skip (e.g. on forks without the permission).
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
      with:
        # Explicit on purpose — NOT .python-version: this gate is distributable to other
        # repos that won't have our .python-version file. Keep it self-contained.
        python-version: '3.13'
        check-latest: true       # always fetch the newest patch of that minor

    - name: Install scanner
      shell: bash
      # Name-agnostic git install: works whether the pinned ref predates or follows
      # the PyPI rename (the dist name changed; the console scripts did not). Once the
      # package is on PyPI this becomes `pip install "stayawakebot==<version>"`.
      run: pip install "git+https://github.com/Ndevu12/stayAwakeBot@${{ inputs.sentinel-ref }}"

    - name: Assert scanner capability
      shell: bash
      # The pinned scanner (sentinel-ref) is decoupled from this action, which lives at HEAD
      # and evolves. If the pin predates a CLI flag the run step uses, the scan would fail
      # mid-flight with an opaque argparse error. Fail FAST here instead, naming the fix —
      # this is the guard for the exact skew that shipped a `--sarif`-less pin once before.
      run: |
        # Only --sarif is REQUIRED: the run step always uses it. Local scope is handled
        # version-agnostically below (-L is passed only when the scanner still supports
        # --local), so it must NOT be asserted here — the #1069 CLI redesign made local the
        # default and removed --local, and asserting it would wrongly fail every post-#1069 pin.
        missing=""
        for flag in --sarif; do
          saw scan --help 2>&1 | grep -q -- "$flag" || missing="$missing $flag"
        done
        if [ -n "$missing" ]; then
          echo "::error::pinned scanner (sentinel-ref) lacks 'saw scan'$missing — bump sentinel-ref to a newer reviewed SHA." >&2
          exit 1
        fi
        echo "Scanner capability OK (saw scan supports the flags this action uses)."

    - name: Run worm scan
      id: scan
      shell: bash
      run: |
        set -euo pipefail
        cfg="$(mktemp)"
        {
          echo "settings:"
          echo "  exclude_dirs: [\".git\", \"node_modules\", \".next\", \"dist\", \"build\", \".malware-quarantine\", \".venv\", \"reports\"]"
          echo "targets:"
          echo "  local: [\"$GITHUB_WORKSPACE\"]"
          echo "  github: { users: [], orgs: [] }"
          if [ -n "${{ inputs.allowlist-globs }}" ]; then
            echo "allowlist:"
            IFS=',' read -ra G <<< "${{ inputs.allowlist-globs }}"
            for entry in "${G[@]}"; do
              glob="$(echo "${entry%%|*}" | xargs)"
              echo "  - path_glob: \"$glob\""
              if [ "$entry" != "${entry%%|*}" ]; then
                sig="$(echo "${entry#*|}" | xargs)"
                [ -n "$sig" ] && echo "    signature: \"$sig\""
              fi
            done
          fi
        } > "$cfg"
        # Write the SARIF to a deterministic, workspace-relative path so the upload
        # step below can find it regardless of the scan's exit code.
        rdir="$GITHUB_WORKSPACE/reports/security"
        mkdir -p "$rdir"
        # Local scope, version-agnostically: older scanners used -L/--local for local-only;
        # the #1069 CLI redesign made local the DEFAULT and removed --local. Pass -L only when
        # this (pinned) scanner still supports it, so the action works across that redesign
        # regardless of sentinel-ref.
        lflag=""
        saw scan --help 2>&1 | grep -q -- "--local" && lflag="-L"
        # Terminal-first CLI: `saw scan` ALWAYS exits non-zero on infected (no
        # --fail-on-findings flag anymore). Capture the verdict and honour the action's
        # fail-on-findings input ourselves: force a clean exit when it isn't 'true'.
        set +e
        saw scan $lflag -c "$cfg" --sarif "$rdir/latest.sarif"
        rc=$?
        set -e
        [ "${{ inputs.fail-on-findings }}" = "true" ] || rc=0
        exit $rc

    - name: Upload SARIF to code-scanning
      # always(): the scan above may exit non-zero (fail-on-findings) — we still want the
      # findings to reach the Security tab. The SARIF file is written before that gate.
      if: ${{ always() && inputs.upload-sarif == 'true' && hashFiles('reports/security/latest.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: reports/security/latest.sarif
        category: saw-worm-scan
