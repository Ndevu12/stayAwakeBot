## File 4 — `scripts/alerter.py`

### What it must do

1. Accept the path to `reports/latest.json` and `reports/history.json` as CLI args
2. Load both files
3. For each **unhealthy** URL:
   a. Check if it has already been alerted in the previous run (to avoid duplicate alerts)
   b. Only alert if it has been down for `consecutive_failures_before_alert` consecutive runs
4. For each **healthy** URL that was DOWN in the previous run: fire a **recovery alert**
5. Send alerts via whichever channels are configured (checked via env vars):
   - `SLACK_WEBHOOK_URL` — POST a formatted JSON payload
   - `GITHUB_TOKEN` + `GITHUB_REPOSITORY` — open a GitHub Issue using the REST API

### Slack payload format

```json
{
  "text": "StayAwakeBot Alert",
  "attachments": [
    {
      "color": "#ff0000",
      "title": "DOWN: Marketing site",
      "title_link": "https://example.com",
      "text": "Status 503 | Response time 2841ms | exceeded max_response_ms threshold",
      "footer": "StayAwakeBot | 2025-04-10 14:32 UTC",
      "fields": [
        { "title": "Consecutive failures", "value": "3", "short": true },
        { "title": "Last seen healthy", "value": "2025-04-10 13:00 UTC", "short": true }
      ]
    }
  ]
}
```

Use `#36a64f` (green) for recovery alerts. Use `#ff0000` (red) for down alerts.

### GitHub Issue format

```
Title: [DOWN] Marketing site — https://example.com

Body:
## StayAwakeBot detected a failure

**URL:** https://example.com
**Detected at:** 2025-04-10 14:32 UTC
**Status code:** 503
**Response time:** 2841ms
**Reason:** exceeded max_response_ms threshold (2000ms)
**Consecutive failures:** 3

Auto-opened by StayAwakeBot. Will be auto-closed on recovery.
```

Auto-close the Issue when the URL recovers by posting a closing comment and using the GitHub API to close it. Search for open issues with the label `stayawakebot` to find the right one.

