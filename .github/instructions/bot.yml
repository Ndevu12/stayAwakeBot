## Constraints and quality rules

These are non-negotiable. Violating any of them means the implementation is incorrect:

1. **No hardcoded values anywhere.** Every URL, timeout, threshold, and schedule must come from `config/urls.yml` or environment variables / GitHub secrets.

2. **All URL checks run concurrently.** If there are 50 URLs, they must all be checked at the same time, not one after another. Use `asyncio.gather()`.

3. **Graceful error handling per URL.** A connection timeout on URL #3 must not prevent URLs #4–#50 from being checked. Every exception is caught at the individual URL level.

4. **Retry logic is implemented.** If `retries: 2` is set, each URL gets up to 3 total attempts before being marked DOWN.

5. **No external hosting required.** The bot runs entirely in GitHub Actions and stores all state as files committed back to the repo. No databases, no external services (except optional Slack webhook).

6. **Idempotent commits.** If no URLs changed status and no metrics changed, no commit is made. Use `git diff --staged --quiet` to guard this.

7. **Exit codes are meaningful.** `checker.py` must exit with code `1` if any URL is unhealthy, `0` if all healthy. This allows GitHub Actions to surface failures as red ❌ steps.

8. **All scripts have `--help` documentation.** Every CLI argument must be documented via `argparse`.

9. **UTC everywhere.** All timestamps use UTC. No local time zones.

10. **Reports are append-only.** Never delete or overwrite old report files. Always write to a new timestamped path.

