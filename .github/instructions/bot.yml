## File 2 — `scripts/checker.py`

### What it must do (step by step)

1. Accept `config/urls.yml` path as a CLI argument (`--config`, default `config/urls.yml`)
2. Load and validate the YAML config
3. Launch all URL checks **concurrently** using `asyncio.gather()` — never check URLs one-by-one in a loop
4. For each URL:
   a. Resolve DNS and open connection — record DNS time separately if possible
   b. Send HTTP GET with the configured `User-Agent` header and timeout
   c. Handle `asyncio.TimeoutError` and `aiohttp.ClientConnectorError` gracefully — mark as DOWN, log the error, continue
   d. Record: HTTP status code, total response time in ms, redirect chain depth (`len(resp.history)`)
   e. If `check_ssl: true`, inspect the TLS certificate using Python's `ssl` + `socket` modules — record: `valid` (bool), `expires_in_days` (int or null)
   f. If `keyword` is set, read the response body and check for the substring (case-insensitive)
   g. Evaluate overall health: `healthy = status_ok AND latency_ok AND ssl_ok AND keyword_ok`
5. Implement retry logic — if `retries > 0` and the check fails, retry up to that many times before marking DOWN
6. Write results to `reports/latest.json` (create the directory if needed)
7. Print a one-line summary per URL to stdout for GitHub Actions logs
8. Exit with code `1` if any URL is unhealthy (so GitHub Actions marks the step as failed if desired), `0` if all healthy

### Result dict shape (one per URL)

```python
{
    "name": str,
    "url": str,
    "checked_at": str,          # ISO 8601 UTC, e.g. "2025-04-10T14:32:00+00:00"
    "status_code": int | None,
    "response_ms": int | None,
    "redirect_count": int,
    "ssl": {
        "valid": bool,
        "expires_in_days": int | None,
        "error": str | None
    } | None,
    "keyword_found": bool | None,   # null if no keyword configured
    "healthy": bool,
    "error": str | None,            # "timeout", "connection_error: ...", etc.
    "attempt": int,                 # which attempt succeeded (1 = first try)
    "tags": list[str]
}
```

### Sample output (stdout)

```
[OK  ] My API              200   312ms   SSL: 89d remaining
[FAIL] Marketing site      503   2841ms  exceeded max_response_ms (2000)
[FAIL] Admin dashboard     —     —       timeout after 5s (attempt 2/2)
```

### Implementation notes

- Use `aiohttp.ClientSession` with a shared `TCPConnector(limit=20)` — do not create a new session per URL
- SSL cert inspection must use `ssl` + `socket` in a thread pool (`loop.run_in_executor`) since it is blocking
- Do not verify the TLS cert via aiohttp (`ssl=False`) — cert inspection is handled separately so you can still capture cert data even for expired certs
- Use `time.monotonic()` for all latency measurements — never `time.time()`
- All exceptions must be caught per-URL — one failing URL must never crash the entire run

