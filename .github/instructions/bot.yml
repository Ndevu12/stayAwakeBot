## Project Overview

Build **StayAwakeBot** — a GitHub Actions-native URL health monitoring bot that:

- Runs **entirely on GitHub Actions** (no external hosting, no database, no paid services)
- Checks a configurable list of URLs on a **cron schedule**
- Captures health metrics per URL and writes structured reports back into the repo
- Optionally fires alerts (GitHub Issues, Slack webhook) when URLs go down
- Produces a **machine-readable `status.json`** and a **human-readable markdown report** per run
- Auto-updates a **status badge** in `README.md`

Everything — URLs, timeouts, schedules, thresholds, alert channels — must be configurable via a single `config/urls.yml` file and GitHub repository secrets. No logic should be hardcoded.

