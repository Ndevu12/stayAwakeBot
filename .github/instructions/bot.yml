## Implementation order

Build in this exact sequence — each step is independently testable:

1. `config/urls.yml` — write the sample config with 3 realistic URLs
2. `requirements.txt` — minimal deps
3. `scripts/checker.py` — the core async HTTP checker
4. Test: `python scripts/checker.py` should produce `reports/latest.json` locally
5. `scripts/reporter.py` — reads `latest.json`, writes markdown + updates `status.json`
6. Test: `python scripts/reporter.py` should produce a report file and updated README badge
7. `scripts/alerter.py` — reads results, sends Slack/GitHub alerts
8. Test: `python scripts/alerter.py` with `SLACK_WEBHOOK_URL` set to a test webhook
9. `.github/workflows/health-check.yml` — wire everything together
10. `README.md` — add usage docs, badge placeholder, and setup instructions

