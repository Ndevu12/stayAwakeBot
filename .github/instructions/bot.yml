## Do not do any of the following

- Do not use `requests` (synchronous) — use `aiohttp` for all HTTP calls
- Do not use `time.sleep()` anywhere — all waiting is handled by asyncio timeouts
- Do not store any state outside the repo (no Redis, no S3, no external APIs except alerts)
- Do not create separate per-URL workflow files — one workflow handles everything
- Do not use GitHub Actions matrix strategy for URL parallelism — use asyncio within a single job
- Do not print raw stack traces to stdout — catch exceptions and log clean error messages
- Do not commit `reports/latest.json` alone — always commit the dated report file alongside it

