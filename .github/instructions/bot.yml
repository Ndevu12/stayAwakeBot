## File 1 — `config/urls.yml`

This is the **single source of truth** for the entire bot. Every value must be respected by the scripts.

### Specification

```yaml
settings:
  # Global defaults — can be overridden per URL
  timeout_seconds: 10
  retries: 2
  user_agent: "StayAwakeBot/1.0 (github-health-checker)"
  alert_on_failure: true
  alert_on_recovery: true           # Fire alert when a previously-DOWN URL recovers
  consecutive_failures_before_alert: 2   # Don't alert on the first flap — wait N failures

urls:
  - name: "My API"
    url: "https://api.example.com/health"
    expected_status: 200
    max_response_ms: 800            # Fail if slower than this (null = no threshold)
    check_ssl: true
    keyword: "ok"                   # Optional: fail if this string is not in the response body
    tags: [api, production]
    timeout_seconds: 5              # Per-URL override of global setting

  - name: "Marketing site"
    url: "https://example.com"
    expected_status: 200
    max_response_ms: 2000
    check_ssl: true
    tags: [web, production]

  - name: "Admin dashboard"
    url: "https://admin.example.com/login"
    expected_status: 200
    max_response_ms: 3000
    check_ssl: true
    tags: [web, internal]
```

### Rules

- All fields except `name` and `url` are optional — apply sensible defaults from `settings`
- `tags` is a list of arbitrary strings for grouping/filtering in reports
- `keyword` triggers a body-content check — mark the URL unhealthy if the string is absent
- `check_ssl` only applies to `https://` URLs — silently skip for `http://`

