## File 5 — `.github/workflows/health-check.yml`

### Requirements

```yaml
name: URL Health Check

on:
  schedule:
    - cron: '*/5 * * * *'    # Every 5 minutes — configurable
  workflow_dispatch:           # Allow manual runs from GitHub UI
    inputs:
      config_path:
        description: 'Path to config file'
        required: false
        default: 'config/urls.yml'
  push:
    paths:
      - 'config/urls.yml'     # Re-run whenever config changes

permissions:
  contents: write              # Needed to commit reports back to repo
  issues: write                # Needed to open/close GitHub Issues

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full history for uptime calculation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        run: python scripts/checker.py --config config/urls.yml

      - name: Generate report
        run: python scripts/reporter.py

      - name: Send alerts
        if: always()           # Run even if checker step fails
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/alerter.py

      - name: Commit reports
        if: always()
        run: |
          git config user.name "StayAwakeBot"
          git config user.email "bot@stayawake.local"
          git add reports/ README.md
          git diff --staged --quiet || git commit -m "chore: health report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
```

### Notes

- The `git diff --staged --quiet || git commit` pattern prevents empty commits if nothing changed
- Use `if: always()` on alert and commit steps so they run even when the checker detects failures
- All secrets are passed via `env:` — never hardcode values in the workflow

