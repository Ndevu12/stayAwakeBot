## File 3 — `scripts/reporter.py`

### What it must do

1. Read `reports/latest.json`
2. Read `reports/history.json` (previous runs' summaries — create empty if it doesn't exist)
3. Compute per-URL uptime percentage from history (last 30 days of runs)
4. Write a **markdown report** to `reports/YYYY-MM-DD/HH-MM-UTC.md`
5. Append a summary line to `reports/history.json`
6. Update `reports/status.json` with the latest status of every URL
7. Update the status badge in `README.md`

### Markdown report format

```markdown
# Health report — 2025-04-10 14:32 UTC

**Run summary:** 8 checked · 7 healthy · 1 down · avg response 412ms

## Results

| Name | Status | Code | Response | SSL | Uptime (30d) |
|------|--------|------|----------|-----|--------------|
| My API | ✅ OK | 200 | 312ms | 89d | 99.8% |
| Marketing site | ❌ DOWN | 503 | 2841ms | 45d | 97.2% |
| Admin dashboard | ❌ DOWN | — | timeout | — | 94.1% |

## Details

### My API
- URL: `https://api.example.com/health`
- Checked at: 2025-04-10T14:32:00+00:00
- Redirects: 0
- Tags: api, production

### Marketing site
- URL: `https://example.com`
- Error: exceeded max_response_ms threshold (2000ms)
- ...
```

