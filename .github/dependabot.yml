# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps both the SHA and
  # the trailing `# vX.Y.Z` comment, and scans the composite actions under
  # .github/actions/ as well as the workflows. Grouped into one weekly PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # Keep Python deps (declared in pyproject.toml) current.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "build"
